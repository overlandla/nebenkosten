name: OSV Scanner Scheduled Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "43 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.0
